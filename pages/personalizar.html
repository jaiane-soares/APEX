<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Apex | Personalizar</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/personalizar.css">
    <link rel="stylesheet" href="../css/components/components.css">
    <script src="../js/main.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
      }
    }
    </script>
</head>
<body>
    <div id="header-placeholder"></div>

    <canvas id="canvas-3d"></canvas>

    <main id="ui-interface">
        <aside id="menu-categorias">
            <nav id="grid-opcoes">
                <div class="card-opcao active" data-target="cores" id="opt-cores">
                    <span class="label">Cores</span>
                </div>
                <div class="card-opcao" data-target="rodas" id="opt-rodas">
                    <span class="label">Rodas</span>
                </div>
                <div class="card-opcao" data-target="carroceria" id="opt-carroceria">
                    <span class="label">Carroceria</span>
                </div>
                <div class="card-opcao" data-target="acessorios" id="opt-acessorios">
                    <span class="label">Acessórios</span>
                </div>
            </nav>
        </aside>

        <aside id="menu-selecao">
            <div class="aba-conteudo" id="content-rodas">
    <p class="section-title">Rodas Disponíveis</p>
    <div id="grid-rodas">
        <button class="btn-item" onclick="changeWheels('../assets/models/wheel_sport.glb')">RODA ORIGINAL</button>
        <button class="btn-item" onclick="changeWheels('../assets/models/wheel_classic.glb')">BBS RS</button>
        <button class="btn-item" onclick="changeWheels('../assets/models/rodaGSI.glb')">GSI</button>
        <button class="btn-item" onclick="resetWheels()">ResetRodas</button>
    </div>
</div>

    <div id="container-itens">
        <div class="aba-conteudo active" id="content-cores">
            <h2 id="titulo-selecao">Cores</h2>

            <div id="grid-cores-expandido">
    <div class="cor-item" style="background: #555; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px;" onclick="resetCarColor()" title="Cor Original">Reset</div>
    
    
</div>
            <div id="grid-cores-expandido">
                <div class="cor-item" style="background: #7300FF;" onclick="changeColor('#7300FF', 0.9, 0.1)" title="Roxo Apex"></div>
                <div class="cor-item" style="background: #00FF41;" onclick="changeColor('#00FF41', 0.8, 0.2)" title="Verde Neon"></div>
                <div class="cor-item" style="background: #FF0000;" onclick="changeColor('#FF0000', 0.9, 0.1)" title="Vermelho Sport"></div>
                <div class="cor-item" style="background: #FFFFFF;" onclick="changeColor('#FFFFFF', 0.5, 0.0)" title="Branco Perolizado"></div>
                <div class="cor-item" style="background: #2C2C2C;" onclick="changeColor('#2C2C2C', 1.0, 0.1)" title="Chumbo Metálico"></div>
                
        </div>
        </div>
</aside>
    </main>

    <script type="module" src="../js/car-render.js"></script>
</body>
</html>
