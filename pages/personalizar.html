<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Personalizar</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components/components.css">
    <link rel="stylesheet" href="../css/pages/personalizar.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    
</head>
<body>
    <div id="header-placeholder"></div>
  <div class="visualizador-container" style="position: relative; width: 100%; height: 100vh;">
    <model-viewer 
        id="car-viewer"
        src="../assets/models/KadettAntigoo.glb" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        style="width: 100%; height: 100%;">
    </model-viewer>
    
    <model-viewer id="slot-roda-fl" class="roda-fixa" src="../assets/models/rodaGSI.glb"></model-viewer>
    <model-viewer id="slot-roda-fr" class="roda-fixa" src="../assets/models/rodaGSI.glb"></model-viewer>
    <model-viewer id="slot-roda-bl" class="roda-fixa" src="../assets/models/rodaGSI.glb"></model-viewer>
    <model-viewer id="slot-roda-br" class="roda-fixa" src="../assets/models/rodaGSI.glb"></model-viewer>
</div>
        
    
    <main id="ui-interface">
        <aside id="menu-categorias">
            <nav id="grid-opcoes">
                <div class="card-opcao active" data-target="cores">
                    <span class="label">Cores</span>
                </div>
                <div class="card-opcao" data-target="rodas">
                    <span class="label">Rodas</span>
                </div>
                <div class="card-opcao" data-target="carroceria">
                    <span class="label">Carroceria</span>
                </div>
            </nav>
        </aside>

        <aside id="menu-selecao">
    <div id="container-itens">
        
        <div class="aba-conteudo active" id="content-cores">
            <h2 id="titulo-selecao">Pintura</h2>
            <div class="grid-selecao">
                <label for="colorPicker" class="color-picker-label">
                    Escolha uma cor personalizada:
                    <input type="color" id="colorPicker" value="#071c83">
                </label>
            </div>
        </div>

       <div class="aba-conteudo" id="content-rodas">
    <h2 id="titulo-selecao">Rodas</h2>
    <div class="grid-selecao-botoes">
        <button class="btn-item" data-model="rodaGSI.glb">GSI Original</button>
        <button class="btn-item" data-model="KadettAntigoo.glb">BBS Motorsport</button>
    </div>
</div>

        <div class="aba-conteudo" id="content-carroceria">
            <h2 id="titulo-selecao">Aero</h2>
            <div class="grid-selecao-botoes">
                <button class="btn-item" data-part="aerofolio.glb">Aerofólio Esportivo</button>
            </div>
        </div>

    </div>
</aside>
        
    
    </main>

   <script src="../js/main.js"></script>
    <script type="module" src="../js/car-render.js"></script>
    
    <script>
        const cards = document.querySelectorAll('.card-opcao');
        const abas = document.querySelectorAll('.aba-conteudo');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                abas.forEach(aba => aba.classList.remove('active'));
                const target = card.getAttribute('data-target');
                document.getElementById(`content-${target}`).classList.add('active');
            });
        });
    </script>
</body>
</html>
</body>
</html>
