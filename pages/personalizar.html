<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Apex | Personalizar</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/personalizar.css">
    <link rel="stylesheet" href="../css/components/components.css">
    <script src="../js/main.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
      }
    }
    </script>
</head>
<body>
    <div id="header-placeholder"></div>

    <canvas id="canvas-3d"></canvas>

    <main id="ui-interface">
        <aside id="menu-categorias">
            <nav id="grid-opcoes">
                <div class="card-opcao active" data-target="cores" id="opt-cores">
                    <span class="label">Cores</span>
                </div>
                <div class="card-opcao" data-target="rodas" id="opt-rodas">
                    <span class="label">Rodas</span>
                </div>
                <div class="card-opcao" data-target="carroceria" id="opt-carroceria">
                    <span class="label">Carroceria</span>
                </div>
                <div class="card-opcao" data-target="acessorios" id="opt-acessorios">
                    <span class="label">Acessórios</span>
                </div>
            </nav>
        </aside>

        <aside id="menu-selecao">
            <div id="container-itens">
                <div class="aba-conteudo active" id="content-cores">
                    <p class="section-title">Escolha a Cor</p>
                    <div id="lista-cores">
                        <div class="cor-item" style="background: #7300FF;" onclick="changeColor('#7300FF')"></div>
                        <div class="cor-item" style="background: #00FF41;" onclick="changeColor('#00FF41')"></div>
                        <div class="cor-item" style="background: #FFFFFF;" onclick="changeColor('#FFFFFF')"></div>
                        <div class="cor-item" style="background: #1A1A1A;" onclick="changeColor('#1A1A1A')"></div>
                    </div>
                </div>
                
            </div>
        </aside>
    </main>

    <script type="module" src="../js/car-render.js"></script>
</body>
</html>
