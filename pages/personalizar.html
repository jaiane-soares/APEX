<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizar</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components/components.css">
    <link rel="stylesheet" href="../css/pages/personalizar.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    

        <div id="car-viewer-container">
    <img id="car-image-360" src="/assets/models/render_360/0001.png" alt="Visualização 360 do Carro">
</div>
        
    <main id="ui-interface">
        <aside id="menu-categorias">
            <nav id="grid-opcoes">
                <div class="card-opcao active" data-target="cores"><span class="label">Cores</span></div>
               
            </nav>
        </aside>

       <div class="aba-conteudo active" id="content-cores">
    <h2 id="titulo-selecao">Pintura</h2>
    <div class="grid-selecao">
        <div class="cor-item" data-cor="prata" style="background: #c0c0c0;"></div>
        <div class="cor-item" data-cor="azul" style="background: #071c83;"></div>
        <div class="cor-item" data-cor="vermelho" style="background: #ff0000;"></div>
    </div>
</div>
    </main>

    <script src="../js/main.js"></script>
    <script type="module" src="../js/car-render.js"></script>
    <script>
        const cards = document.querySelectorAll('.card-opcao');
        const abas = document.querySelectorAll('.aba-conteudo');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                abas.forEach(aba => aba.classList.remove('active'));
                document.getElementById(`content-${card.getAttribute('data-target')}`).classList.add('active');
            });
        });
    </script>
</body>
</html>
