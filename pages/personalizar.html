<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Apex | Personalizar</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/personalizar.css">
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
      }
    }
    </script>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <canvas id="canvas-3d"></canvas>

    <main id="ui-interface">
        <aside id="menu-categorias">
            <nav id="grid-opcoes">
                <div class="card-opcao active" data-target="cores">Cores</div>
                <div class="card-opcao" data-target="rodas">Rodas</div>
            </nav>
        </aside>

        <aside id="menu-selecao">
            <div id="container-itens">
                <div class="aba-conteudo active" id="content-cores">
                    <h2 id="titulo-selecao">Pintura</h2>
                    <div id="grid-cores-expandido">
                        <div class="cor-item" style="background: #555;" onclick="resetCarColor()"></div>
                        <div class="cor-item" style="background: #7300FF;" onclick="changeColor('#7300FF')"></div>
                        <div class="cor-item" style="background: #a2ff00;" onclick="changeColor('#a2ff00')"></div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script src="../js/main.js"></script>
    <script type="module" src="../js/car-render.js"></script>
</body>
</html>
