<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex | Personalizar</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components/components.css">
    <link rel="stylesheet" href="../css/pages/personalizar.css">

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
      }
    }
    </script>
</head>
<body>
    <div id="header-placeholder"></div>

    <canvas id="canvas-3d"></canvas>

   <main class="ui-wrapper">
    <div class="control-panel">
        <div class="panel-content">
            <header class="panel-header">
                <h1>Ajuste seu Apex</h1>
            </header>

          

            <div class="options-grid">
                <div class="option-card active" id="card-cores">
                    <div class="icon-box">
                        <img src="../assets/imagens/Cores.png" alt="Cores">
                    </div>
                    <div class="text-box">
                        <span class="category">Personalização</span>
                        <span class="title">Cores</span>
                    </div>
                </div>

                <div class="option-card">
                    <div class="icon-box"><img src="../assets/imagens/Rodas.png"></div>
                    <div class="text-box"><span class="category">Personalização</span><span class="title">Rodas</span></div>
                </div>
                <div class="option-card">
                    <div class="icon-box"><img src="../assets/imagens/Carroceria.png"></div>
                    <div class="text-box"><span class="category">Personalização</span><span class="title">Carroceria</span></div>
                </div>
                
            </div>
        </div>
    </div>
</main>

    <div id="footer-placeholder"></div>

    <script src="../js/main.js"></script>
    <script type="module" src="../js/car-render.js"></script>
</body>
</html>
